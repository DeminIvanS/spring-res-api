version: '3.1'

volumes:
  spingResApi:

services:
  pg_spring_db:
    image: postgres
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=spring_app_db
    volumes:
      - spingResApi:/var/lib/postgresql/data
      - ./DB/init.sql:/docker-entrypoint-initdb.d/create_tables.sql
    ports:
      - "5433:5432"
